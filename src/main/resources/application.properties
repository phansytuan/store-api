# Application
spring.application.name=interview-demo
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/storedb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA – Flyway owns the schema; Hibernate only validates it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true

# ── SQL debugging ────────────────────────────────────────────────────────────
# Print every SQL statement to stdout (same as logging.level.org.hibernate.SQL=DEBUG)
spring.jpa.show-sql=true
# Pretty-print multi-line SQL so it is readable
spring.jpa.properties.hibernate.format_sql=true
# Show the actual bind parameter values (? -> real values) instead of '?'
# This is the Hibernate 6 / Spring Boot 3 way using the new logging category
spring.jpa.properties.hibernate.highlight_sql=true

# JWT
jwt.secret=mySecretKeyForInterviewDemoProjectThatIsLongEnough256Bits
jwt.expiration=86400000

# ── Logging levels ───────────────────────────────────────────────────────────
# Your own code – full DEBUG
logging.level.com.interview=DEBUG

# Spring Security filter chain – see every permit/deny decision
logging.level.org.springframework.security=DEBUG

# ── SQL statement logging (Hibernate) ────────────────────────────────────────
# Generated SQL (SELECT / INSERT / UPDATE / DELETE)
logging.level.org.hibernate.SQL=DEBUG
# Bind parameter values that replace the '?' placeholders
# Hibernate 6 (Spring Boot 3): use org.hibernate.orm.jdbc.bind
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Hibernate 5 (Spring Boot 2): use org.hibernate.type.descriptor.sql
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ── HTTP wire logging (Spring Web) ───────────────────────────────────────────
# DispatcherServlet logs which handler mapped each request
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
# Logs request-mapping lookups (which controller method was matched)
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# ── Optional: Apache HttpClient / OkHttp (if you make outbound HTTP calls) ──
# logging.level.org.apache.http.wire=DEBUG
# logging.level.okhttp3.OkHttpClient=DEBUG

# Swagger - use default paths
springdoc.swagger-ui.operationsSorter=method
