# Integration test configuration.
# IMPORTANT: src/test/resources/application.properties shadows (not merges with)
# src/main/resources/application.properties in the test classpath, so every required
# property must be declared here.
#
# NOTE: Testcontainers is not used because Testcontainers 1.21.3 bundles a shaded
# docker-java that hardcodes Docker API version 1.32, which Docker 29.x rejects
# (minimum API 1.40). The test relies on the running docker-compose postgres.
# Run: docker compose up -d  before executing tests.

# Application
spring.application.name=interview-demo
server.port=8080

# PostgreSQL – docker-compose instance
spring.datasource.url=jdbc:postgresql://localhost:5432/storedb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# JWT
jwt.secret=mySecretKeyForInterviewDemoProjectThatIsLongEnough256Bits
jwt.expiration=86400000

# Swagger
springdoc.swagger-ui.operationsSorter=method
